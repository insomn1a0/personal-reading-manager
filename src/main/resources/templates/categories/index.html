<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('categories')}"></nav>

<main class="container page-shell">
    <section class="hero-card mb-4">
        <span class="badge text-bg-light border rounded-pill px-3 py-2 mb-3">Categories</span>
        <h1 class="display-6 fw-bold mb-2">Category organization</h1>
        <p class="section-subtitle fs-5 mb-0">Track how books are grouped and show the catalog structure more clearly during the demo.</p>
    </section>

    <div th:replace="~{fragments/layout :: alerts(${message}, ${error})}"></div>

    <section class="app-card mb-4">
        <h2 class="section-title mb-4">Add category</h2>
        <form th:action="@{/categories}" method="post" class="row g-3">
            <div class="col-md-9">
                <label class="form-label" for="categoryName">Category name</label>
                <input id="categoryName" class="form-control" type="text" name="name" required>
            </div>
            <div class="col-md-3 d-grid">
                <label class="form-label d-none d-md-block">&nbsp;</label>
                <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg me-1"></i>Add</button>
            </div>
        </form>
    </section>

    <section>
        <div class="row g-3">
            <div class="col-12 col-md-6 col-xl-4" th:each="category : ${categories}">
                <div class="app-card h-100 app-card-hover">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h2 class="section-title mb-1" th:text="${category.name}">Category</h2>
                            <div class="text-secondary">Books assigned to this category.</div>
                        </div>
                        <span class="badge text-bg-light border rounded-pill px-3 py-2">
                            <i class="bi bi-collection-fill me-1"></i><span th:text="${category.bookCount}">0</span>
                        </span>
                    </div>
                    <label class="form-label">Edit category</label>
                    <input type="text" name="name" class="form-control" th:value="${category.name}" th:attr="form='category-form-' + ${category.id}" required>
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <form th:id="'category-form-' + ${category.id}" th:action="@{/categories/{id}(id=${category.id})}" method="post">
                            <button class="btn btn-sm btn-outline-primary" type="submit"><i class="bi bi-check2 me-1"></i>Save</button>
                        </form>
                        <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" data-confirm="Delete this category?">
                            <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash3 me-1"></i>Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
