<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Personal Reading Manager'">Personal Reading Manager</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem("app-theme");
            var preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            document.documentElement.setAttribute("data-bs-theme", savedTheme || preferredTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg app-navbar sticky-top border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-book-half"></i></span>
            <span>Personal Reading Manager</span>
        </a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#appNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="appNavbar" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/}">
                        <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'books'} ? ' active'" th:href="@{/books}">
                        <i class="bi bi-journal-bookmark-fill me-1"></i>Books
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'authors'} ? ' active'" th:href="@{/authors}">
                        <i class="bi bi-person-vcard-fill me-1"></i>Authors
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'categories'} ? ' active'" th:href="@{/categories}">
                        <i class="bi bi-tags-fill me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'import'} ? ' active'" th:href="@{/import/isbn}">
                        <i class="bi bi-cloud-download-fill me-1"></i>Import
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-outline-secondary btn-sm theme-toggle-btn" data-theme-toggle aria-label="Toggle theme">
                    <i class="bi bi-moon-stars-fill" data-theme-icon></i>
                    <span class="d-none d-md-inline ms-2">Theme</span>
                </button>
                <a class="btn btn-primary btn-sm" th:href="@{/books/create}">
                    <i class="bi bi-plus-lg me-1"></i>Add book
                </a>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="alerts(message, error)">
    <div class="alert app-alert alert-success alert-dismissible fade show" th:if="${message}" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}">Success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert app-alert alert-danger alert-dismissible fade show" th:if="${error}" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="footer" class="app-footer border-top mt-5 py-4">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 small text-secondary">
        <span>Spring Boot 3 • Thymeleaf • H2 • University lab app</span>
        <span>Modern reading tracker with practical architecture</span>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
